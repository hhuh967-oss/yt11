<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HACKED BY DEX | SYSTEM BREACH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #00ff41;
            font-family: 'Courier New', 'Fira Code', monospace;
            line-height: 1.7;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* تحسين تأثير flicker ليكون أكثر رعبًا */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 65, 0.1),
                rgba(0, 255, 65, 0.1) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 2;
        }

        @keyframes flicker {
            0% { opacity: 0.95; text-shadow: 0 0 2px #0f0; }
            5% { opacity: 0.85; text-shadow: 0 0 5px red; }
            10% { opacity: 0.98; text-shadow: 0 0 2px #0f0; }
            15% { opacity: 0.82; text-shadow: 0 0 8px darkred; }
            100% { opacity: 1; text-shadow: 0 0 2px #0f0; }
        }

        body {
            animation: flicker 0.2s infinite;
        }

        .container {
            max-width: 880px;
            margin: 60px auto;
            border: 1.5px solid #00ff41;
            padding: 28px 24px;
            background-color: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 38px rgba(0, 255, 65, 0.6), inset 0 0 15px rgba(0, 255, 65, 0.3);
            position: relative;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
            border-radius: 12px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #00ff41;
            position: relative;
        }

        .header::after {
            content: "⛧";
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            padding: 0 12px;
            color: #ff3300;
            font-size: 1.6rem;
            text-shadow: 0 0 12px red;
        }

        h1 {
            font-size: 3.4rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 12px;
            text-shadow: 0 0 8px #00ff41, 0 0 18px #ff0000, 0 0 25px #8b0000;
            animation: glitch 2.5s infinite alternate, glowPulse 1.5s ease-in-out infinite alternate;
            word-break: break-word;
        }

        @keyframes glitch {
            0% { text-shadow: -3px 0 #ff00c1, 3px 0 #00fff9, 0 0 5px red; }
            25% { text-shadow: 3px 0 #ff00c1, -3px 0 #00fff9, 0 0 10px darkred; }
            50% { text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9, 0 0 15px crimson; }
            75% { text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
            100% { text-shadow: 0 0 15px #00ff41, 0 0 30px #ff0000; }
        }

        @keyframes glowPulse {
            from { text-shadow: 0 0 5px #0f0; }
            to { text-shadow: 0 0 28px #0f0, 0 0 45px red; }
        }

        .credentials {
            margin: 24px 0;
            padding: 18px 20px;
            border: 1px solid #ff3300;
            background-color: rgba(30, 0, 0, 0.65);
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 8px;
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.4), 0 0 12px rgba(255, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            font-family: monospace;
            word-break: break-word;
            color: #ff6666;
        }

        .message {
            margin: 32px 0;
            padding: 18px 20px;
            border-right: 4px solid #ff3300;
            border-left: 1px dashed #ff6666;
            background: rgba(20, 0, 0, 0.5);
            border-radius: 10px;
            transition: 0.2s;
        }

        .message p {
            margin-bottom: 14px;
            text-align: justify;
            font-size: 1.08rem;
            line-height: 1.6;
        }

        .message p:first-child {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff8888;
            letter-spacing: 1px;
            text-shadow: 0 0 6px red;
        }

        .discord-link {
            display: inline-block;
            background: #2a1a1a;
            padding: 5px 12px;
            border-radius: 30px;
            color: #ff6666;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #ff3300;
            transition: 0.2s;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .discord-link:hover {
            background: #ff3300;
            color: black;
            box-shadow: 0 0 18px red;
            text-shadow: none;
        }

        .signature {
            text-align: right;
            margin-top: 35px;
            padding-top: 18px;
            border-top: 2px solid #ff3300;
            font-weight: bold;
            font-size: 1.15rem;
            letter-spacing: 1px;
            text-shadow: 0 0 6px red;
            color: #ff7777;
        }

        .footer {
            text-align: center;
            margin-top: 45px;
            font-size: 0.85rem;
            color: #ff6666;
            border-top: 1px dotted #ff3300;
            padding-top: 15px;
            opacity: 0.9;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.2em;
            background-color: #ff0000;
            animation: blink 0.7s step-end infinite;
            vertical-align: middle;
            margin-left: 8px;
            box-shadow: 0 0 10px red;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; background-color: #ff0000; }
            50% { opacity: 0; background-color: #8b0000; }
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, transparent, #ff0000, #ff6666, #ff0000, transparent);
            animation: scanMove 4s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
            z-index: 999;
            pointer-events: none;
            opacity: 0.8;
            filter: blur(2px);
        }

        @keyframes scanMove {
            0% { top: 0%; opacity: 0.6; }
            50% { top: 95%; opacity: 1; }
            100% { top: 0%; opacity: 0.6; }
        }

        .hacked-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 12vw;
            font-weight: 900;
            color: rgba(255, 0, 0, 0.08);
            z-index: -1;
            text-transform: uppercase;
            white-space: nowrap;
            user-select: none;
            letter-spacing: 20px;
            pointer-events: none;
            font-family: monospace;
            text-shadow: 0 0 35px red;
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
            opacity: 0.25;
            font-family: monospace;
            font-size: 1rem;
            color: #ff4444;
        }

        .error-flash {
            animation: errorFlash 0.15s 3;
        }

        @keyframes errorFlash {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(255, 0, 0, 0.4); box-shadow: inset 0 0 80px red; }
        }

        @keyframes shakeOnce {
            0% { transform: translate(0, 0); }
            25% { transform: translate(4px, -3px); }
            50% { transform: translate(-3px, 2px); }
            75% { transform: translate(2px, -2px); }
            100% { transform: translate(0, 0); }
        }
        .glitch-box {
            animation: shakeOnce 0.3s ease-in-out;
        }

        @media (max-width: 720px) {
            h1 {
                font-size: 2.2rem;
                letter-spacing: 3px;
            }
            .container {
                padding: 20px 16px;
                margin: 30px 15px;
            }
            .credentials {
                font-size: 1rem;
            }
            .message p {
                font-size: 0.95rem;
            }
            .hacked-text {
                font-size: 14vw;
                letter-spacing: 8px;
            }
        }

        .cyber-tag {
            position: fixed;
            bottom: 15px;
            left: 15px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.8);
            padding: 5px 12px;
            border-left: 4px solid #ff0000;
            color: #ff8888;
            z-index: 99;
            font-family: monospace;
            border-radius: 0 8px 8px 0;
            pointer-events: none;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* تأثير إضافي: نبض للروابط */
        @keyframes redPulse {
            0% { border-color: #ff3300; }
            100% { border-color: #8b0000; }
        }
        .discord-link {
            animation: redPulse 1.2s infinite alternate;
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas" class="matrix-bg" style="position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:-1; opacity:0.2;"></canvas>

    <script>
        (function() {
            // تغيير الاسم من JA7EM إلى DEX بشكل كامل
            const credentialsContainer = document.getElementById('typeWriterTarget');
            let idx = 0;
            const rawText = "dex@darkweb\naccess_granted->root";
            const lines = rawText.split('\n');
            let currentLine = 0;
            let charPos = 0;
            let finalHTML = '';
            
            function typeNextChar() {
                if (currentLine < lines.length) {
                    let lineContent = lines[currentLine];
                    if (charPos < lineContent.length) {
                        finalHTML += lineContent.charAt(charPos);
                        charPos++;
                        let displayHTML = '';
                        for(let i=0; i<=currentLine; i++) {
                            if(i === currentLine) {
                                displayHTML += finalHTML;
                                if(i !== lines.length-1 || charPos < lineContent.length) displayHTML += '<span class="cursor"></span>';
                            } else {
                                displayHTML += lines[i] + '<br>';
                            }
                        }
                        credentialsContainer.innerHTML = displayHTML;
                        setTimeout(typeNextChar, 45);
                    } else {
                        finalHTML = '';
                        currentLine++;
                        charPos = 0;
                        if(currentLine < lines.length) {
                            credentialsContainer.innerHTML += '<br>';
                            setTimeout(typeNextChar, 60);
                        } else {
                            let fullDisplay = '';
                            for(let i=0; i<lines.length; i++) {
                                fullDisplay += lines[i] + (i===lines.length-1 ? '<span class="cursor"></span>' : '<br>');
                            }
                            credentialsContainer.innerHTML = fullDisplay;
                        }
                    }
                }
            }
            typeNextChar();
            
            // تأثيرات رعب أكثر: ومضات حمراء متكررة
            setInterval(() => {
                if (Math.random() > 0.75) {
                    document.body.classList.add('error-flash');
                    setTimeout(() => {
                        document.body.classList.remove('error-flash');
                    }, 350);
                }
            }, 2200);
            
            const containerDiv = document.querySelector('.container');
            if(containerDiv) {
                containerDiv.classList.add('glitch-box');
                setTimeout(() => {
                    containerDiv.classList.remove('glitch-box');
                }, 500);
            }
            
            // محاولة تشغيل الصوت (تم إزالة الاعتماد على ملف خارجي لضمان عدم وجود أخطاء)
            // تم إزالة audio element لأنه كان يشير لملف غير موجود
            
            const discordLink = document.getElementById('discordFakeLink');
            if(discordLink) {
                discordLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.body.style.transition = "0.1s";
                    document.body.style.backgroundColor = "#3a0000";
                    setTimeout(() => document.body.style.backgroundColor = "", 180);
                    window.open('https://discord.gg/dex_zone', '_blank');
                });
            }
            
            // تأثير المصفوفة (Matrix) بلون أحمر مرعب
            const canvas = document.getElementById('matrixCanvas');
            if(canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const ctx = canvas.getContext('2d');
                const chars = "01DEX#@&%$!<>?/\\|[]{}*()";
                const fontSize = 18;
                let columns = Math.floor(canvas.width / fontSize);
                let drops = [];
                for(let i=0; i<columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
                
                function drawMatrix() {
                    if(!canvas || !ctx) return;
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#ff3333";
                    ctx.font = fontSize + "px monospace";
                    for(let i=0; i<drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        const x = i * fontSize;
                        const y = drops[i] * fontSize;
                        if(y < canvas.height && y > 0) {
                            ctx.fillStyle = "#ff6666";
                            ctx.fillText(text, x, y);
                        }
                        if(y > canvas.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                    requestAnimationFrame(drawMatrix);
                }
                drawMatrix();
                
                window.addEventListener('resize', () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    columns = Math.floor(canvas.width / fontSize);
                    drops = [];
                    for(let i=0; i<columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
                });
            }
            
            // تأثير glitch عشوائي أقوى
            const headers = document.querySelectorAll('h1');
            setInterval(() => {
                if(Math.random() > 0.8) {
                    const glitchSpan = document.createElement('style');
                    glitchSpan.textContent = `h1 { animation: glitch 0.15s infinite, glowPulse 0.8s infinite; }`;
                    document.head.appendChild(glitchSpan);
                    setTimeout(() => glitchSpan.remove(), 150);
                }
            }, 3500);
            
            const scan = document.querySelector('.scan-line');
            if(scan) {
                setInterval(() => {
                    scan.style.opacity = "1";
                    setTimeout(() => { if(scan) scan.style.opacity = "0.6"; }, 200);
                }, 1800);
            }
            
            const footerSpan = document.createElement('span');
            footerSpan.style.display = 'block';
            footerSpan.style.marginTop = '8px';
            footerSpan.style.fontSize = '0.7rem';
            const now = new Date();
            footerSpan.innerHTML = `⚡ ATTACK TIMESTAMP: ${now.toLocaleString()} ⚡`;
            document.querySelector('.footer').appendChild(footerSpan);
            
            const msgDiv = document.querySelector('.message');
            if(msgDiv) {
                msgDiv.addEventListener('mouseenter', () => {
                    msgDiv.style.borderRightColor = "#ff5555";
                    msgDiv.style.boxShadow = "0 0 18px red";
                });
                msgDiv.addEventListener('mouseleave', () => {
                    msgDiv.style.borderRightColor = "#ff3300";
                    msgDiv.style.boxShadow = "none";
                });
            }
            
            document.body.addEventListener('click', (e) => {
                if(Math.random() > 0.7) {
                    console.log("%c⚠️ SYSTEM HIJACKED BY DEX ⚠️", "color: #ff3333; font-size: 16px; font-weight: bold;");
                    console.log("%c[ROOT] Access Granted | DEX is watching", "color: #ff6666");
                }
            });
            
            const topBar = document.createElement('div');
            topBar.style.position = 'fixed';
            topBar.style.top = '0';
            topBar.style.left = '0';
            topBar.style.width = '100%';
            topBar.style.backgroundColor = '#0a0000';
            topBar.style.color = '#ff5555';
            topBar.style.fontSize = '11px';
            topBar.style.textAlign = 'center';
            topBar.style.padding = '3px';
            topBar.style.zIndex = '10000';
            topBar.style.fontFamily = 'monospace';
            topBar.style.borderBottom = '1px solid red';
            topBar.innerHTML = '🔒 HACKED ZONE • ALL DATA ENCRYPTED • DEX TEAM 🔒';
            document.body.appendChild(topBar);
            
            setTimeout(() => {
                if(credentialsContainer.innerHTML.length < 20) {
                    credentialsContainer.innerHTML = 'dex@darkweb<br>access_granted->root<span class="cursor"></span>';
                }
            }, 2000);
        })();
    </script>
